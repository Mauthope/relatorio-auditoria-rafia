<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <!-- Outer Bezel -->
  <rect x="10" y="10" width="380" height="280" rx="15" fill="#2d3748" stroke="#1a202c" stroke-width="4"/>
  <!-- Inner Panel -->
  <rect x="25" y="25" width="350" height="250" rx="10" fill="#1a202c"/>
  <!-- Logo/Brand -->
  <text x="50" y="55" font-family="'Inter', sans-serif" font-size="14" font-weight="700" fill="#a0aec0" letter-spacing="1">M&amp;M PRECISION</text>
  <text x="350" y="55" font-family="'Inter', sans-serif" font-size="12" font-weight="600" fill="#4a5568" text-anchor="end">MODEL: QC-500</text>
  <!-- LCD screen bezel -->
  <rect x="45" y="80" width="310" height="130" rx="8" fill="#0d1117" stroke="#4a5568" stroke-width="2"/>
  <!-- LCD screen background -->
  <rect x="50" y="85" width="300" height="120" rx="5" fill="#05070a"/>
  <!-- Scale Status Indicators -->
  <text x="65" y="115" font-family="'Roboto Mono', monospace" font-size="10" font-weight="700" fill="#00ff66" opacity="0.8">STABLE</text>
  <text x="120" y="115" font-family="'Roboto Mono', monospace" font-size="10" font-weight="700" fill="#00ff66" opacity="0.3">ZERO</text>
  <text x="165" y="115" font-family="'Roboto Mono', monospace" font-size="10" font-weight="700" fill="#00ff66" opacity="0.8">NET</text>
  <!-- Weight Display -->
  <text x="260" y="175" font-family="'Roboto Mono', monospace" font-size="52" font-weight="700" fill="#00ff66" text-anchor="end" letter-spacing="-2">63.69</text>
  <!-- Unit -->
  <text x="325" y="175" font-family="'Inter', sans-serif" font-size="28" font-weight="700" fill="#00ff66">g</text>
  <!-- Lower Button Strip -->
  <rect x="50" y="235" width="60" height="25" rx="3" fill="#4a5568"/>
  <text x="80" y="251" font-family="'Inter', sans-serif" font-size="9" font-weight="700" fill="#cbd5e0" text-anchor="middle">TARE</text>
  <rect x="130" y="235" width="60" height="25" rx="3" fill="#4a5568"/>
  <text x="160" y="251" font-family="'Inter', sans-serif" font-size="9" font-weight="700" fill="#cbd5e0" text-anchor="middle">ZERO</text>
  <rect x="210" y="235" width="60" height="25" rx="3" fill="#4a5568"/>
  <text x="240" y="251" font-family="'Inter', sans-serif" font-size="9" font-weight="700" fill="#cbd5e0" text-anchor="middle">PRINT</text>
  <rect x="290" y="235" width="60" height="25" rx="3" fill="#14b8a6"/>
  <text x="320" y="251" font-family="'Inter', sans-serif" font-size="9" font-weight="700" fill="#0b0f19" text-anchor="middle">ON/OFF</text>
</svg>